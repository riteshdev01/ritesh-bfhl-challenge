<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Node Hierarchy Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --surface:   #13161f;
      --surface2:  #1a1e2a;
      --border:    #242835;
      --accent:    #6e56ff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --amber:     #fbbf24;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Space Grotesk', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      background: rgba(11,14,20,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    header span {
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: auto;
      font-family: var(--mono);
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .hero {
      margin-bottom: 2.5rem;
    }
    .hero h2 {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 520px;
    }

    /* ── Input section ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .input-card label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.7;
      padding: 0.85rem 1rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .hint code {
      font-family: var(--mono);
      color: var(--accent2);
      background: rgba(110,86,255,0.1);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* ── Config row ── */
    .config-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .config-row label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }
    .config-row input {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.45rem 0.75rem;
      outline: none;
    }
    .config-row input:focus { border-color: var(--accent); }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: var(--red);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* ── Response area ── */
    #response { display: none; }

    /* ── Summary bar ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
    }
    .stat-card .val {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--accent2);
      line-height: 1;
    }
    .stat-card .lbl {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Section heading ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.75rem 0 1rem;
    }
    .section-head h3 {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .section-head .pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--muted);
      padding: 1px 8px;
    }

    /* ── Hierarchies grid ── */
    .hier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .hier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .hier-card:hover { border-color: var(--accent); }
    .hier-card.cyclic { border-color: rgba(251,191,36,0.35); }

    .hier-card-head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .root-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .hier-card-head .meta { flex: 1; }
    .hier-card-head .meta .title {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .hier-card-head .meta .sub {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .cycle-badge {
      background: rgba(251,191,36,0.15);
      border: 1px solid rgba(251,191,36,0.4);
      color: var(--amber);
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      letter-spacing: 0.05em;
    }
    .depth-badge {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      color: var(--green);
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
    }

    /* ── Tree renderer ── */
    .tree-view {
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.8;
      color: var(--text);
    }
    .tree-line { display: flex; align-items: center; gap: 0.3rem; }
    .tree-prefix { color: var(--muted); white-space: pre; }
    .tree-node {
      background: rgba(110,86,255,0.12);
      border: 1px solid rgba(110,86,255,0.2);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--accent2);
      font-weight: 600;
    }
    .tree-node.leaf {
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.2);
      color: var(--green);
    }
    .cycle-msg {
      color: var(--amber);
      font-size: 0.8rem;
      font-family: var(--mono);
      padding: 0.5rem 0;
    }

    /* ── Tag lists ── */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .tag.invalid {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--red);
    }
    .tag.dup {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: var(--amber);
    }
    .empty-msg {
      color: var(--muted);
      font-size: 0.83rem;
      font-family: var(--mono);
    }

    /* ── Raw JSON toggle ── */
    .raw-toggle {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    pre#rawJson {
      display: none;
      margin-top: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
      overflow-x: auto;
      white-space: pre-wrap;
    }

    /* ── Loading spinner ── */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      main { padding: 1.5rem 1rem 4rem; }
      .hero h2 { font-size: 1.8rem; }
      .input-row { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>BFHL Explorer</h1>
  <span>POST /bfhl</span>
</header>

<main>
  <div class="hero">
    <h2>Node Hierarchy<br/>Visualizer</h2>
    <p>Enter edge strings to parse tree structures, detect cycles, and explore hierarchical relationships.</p>
  </div>

  <!-- API URL config -->
  <div class="config-row">
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" value="https://bfhl-api-vert-iota.vercel.app/bfhl" placeholder="https://your-api.vercel.app/bfhl" />
  </div>

  <!-- Input card -->
  <div class="input-card">
    <label>Enter node edges (comma or newline separated)</label>
    <div class="input-row">
      <textarea id="inputData" placeholder='A->B, A->C, B->D, C->E, E->F,&#10;X->Y, Y->Z, Z->X,&#10;P->Q, Q->R,&#10;G->H, G->H, G->I,&#10;hello, 1->2, A->'></textarea>
      <button class="btn" id="submitBtn" onclick="submit()">
        <span id="btnText">Analyse</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
    <p class="hint">
      Valid format: <code>A->B</code> &nbsp;·&nbsp; Single uppercase letters only &nbsp;·&nbsp; Self-loops (<code>A->A</code>) are invalid
    </p>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Response -->
  <div id="response">
    <!-- Summary stats -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- Hierarchies -->
    <div class="section-head">
      <h3>Hierarchies</h3>
      <span class="pill" id="hierCount">0</span>
    </div>
    <div class="hier-grid" id="hierGrid"></div>

    <!-- Invalid entries -->
    <div class="section-head">
      <h3>Invalid Entries</h3>
      <span class="pill" id="invalidCount">0</span>
    </div>
    <div class="tag-row" id="invalidTags"></div>

    <!-- Duplicate edges -->
    <div class="section-head">
      <h3>Duplicate Edges</h3>
      <span class="pill" id="dupCount">0</span>
    </div>
    <div class="tag-row" id="dupTags"></div>

    <!-- Raw JSON -->
    <div class="raw-toggle">
      <button class="btn-ghost" onclick="toggleRaw()">View raw JSON</button>
    </div>
    <pre id="rawJson"></pre>
  </div>
</main>

<script src="./app.js"></script>
</body>
</html>
